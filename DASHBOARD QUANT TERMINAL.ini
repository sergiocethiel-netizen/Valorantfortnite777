def escribir_hoja_valoracion(wb: Workbook, df: pd.DataFrame):
    ws = wb.active
    ws.title = "Matriz de Valoración"
    ws.sheet_view.showGridLines = False

    # ── Fila de título ────────────────────────────────────────────────────────
    ws.merge_cells("A1:J1")
    titulo = ws["A1"]
    titulo.value = (
        "MATRIZ DE VALORACIÓN — UNIVERSO DE INVERSIÓN | "
        f"Caso Actinver  ·  JPMorgan Quantitative Advisory  ·  "
        f"Fecha: {datetime.today().strftime('%d/%m/%Y')}"
    )
    titulo.font      = Font(name="Arial", bold=True, color=COLOR_HEADER_FONT, size=12)
    titulo.fill      = PatternFill("solid", start_color=COLOR_HEADER_BG)
    titulo.alignment = Alignment(horizontal="center", vertical="center")
    ws.row_dimensions[1].height = 28

    # ── Fila de subtítulo ─────────────────────────────────────────────────────
    ws.merge_cells("A2:J2")
    sub = ws["A2"]
    sub.value = (
        "Perfil de Riesgo: Moderado  |  VaR Objetivo: −2.0% a −2.5% (paramétrico)  |  "
        "Universo: 10 acciones (CSV) + SHV + IEF (yfinance)"
    )
    sub.font      = Font(name="Arial", bold=False, color=COLOR_HEADER_FONT, size=9)
    sub.fill      = PatternFill("solid", start_color=COLOR_ACCENT)
    sub.alignment = Alignment(horizontal="center", vertical="center")
    ws.row_dimensions[2].height = 18

    # ── Encabezados de columna ────────────────────────────────────────────────
    for col_idx, (header, ancho) in enumerate(zip(ENCABEZADOS, ANCHOS), start=1):
        cell = ws.cell(row=3, column=col_idx, value=header)
        estilo_encabezado(cell)
        ws.column_dimensions[get_column_letter(col_idx)].width = ancho
    ws.row_dimensions[3].height = 36

    # ── Filas de datos ────────────────────────────────────────────────────────
    for fila_idx, row in enumerate(df.itertuples(index=False), start=4):
        es_deuda = row.Tipo_de_Activo.startswith("Deuda")
        rsi_val  = row.RSI_14d
        hist_val = row.MACD_Histograma
        senal    = row.Senal_Tecnica

        valores = [
            row.Ticker,
            row.Tipo_de_Activo,
            row.Valuacion_Relativa,
            row.Sharpe_Ratio if not (isinstance(row.Sharpe_Ratio, float)
                                     and math.isnan(row.Sharpe_Ratio)) else "N/D",
            rsi_val if not (isinstance(rsi_val, float) and math.isnan(rsi_val)) else "N/D",
            row.MACD_Linea   if not (isinstance(row.MACD_Linea, float)
                                     and math.isnan(row.MACD_Linea)) else "N/D",
            row.MACD_Senal   if not (isinstance(row.MACD_Senal, float)
                                     and math.isnan(row.MACD_Senal)) else "N/D",
            hist_val         if not (isinstance(hist_val, float)
                                     and math.isnan(hist_val)) else "N/D",
            senal,
            None,  # Fuente de datos (hipervínculo), se trata aparte
        ]

        for col_idx, valor in enumerate(valores, start=1):
            cell = ws.cell(row=fila_idx, column=col_idx, value=valor)
            if es_deuda:
                estilo_fila_deuda(cell)
            else:
                estilo_fila_equity(cell, fila_idx)

            # Formato numérico financiero para columnas cuantitativas
            if col_idx == 4 and isinstance(valor, float):      # Sharpe
                cell.number_format = "0.0000"
            elif col_idx in (5,) and isinstance(valor, float): # RSI
                cell.number_format = "0.00"
            elif col_idx in (6, 7, 8) and isinstance(valor, float):  # MACD
                cell.number_format = "0.0000"

        # ── Señal técnica con color semáforo ──────────────────────────────────
        senal_cell = ws.cell(row=fila_idx, column=9)
        senal_cell.font = Font(
            name="Arial", bold=True,
            color=color_senal(senal), size=9
        )

        # ── Hipervínculo Yahoo Finance ────────────────────────────────────────
        url = row.URL_Yahoo
        link_cell = ws.cell(
            row=fila_idx, column=10,
            value=f'=HYPERLINK("{url}","Yahoo Finance")'
        )
        link_cell.font = Font(
            name="Arial", color="0563C1", underline="single", size=9
        )
        if es_deuda:
            link_cell.fill = PatternFill("solid", start_color=COLOR_DEUDA_BG)
        else:
            bg = COLOR_STRIPE if fila_idx % 2 == 0 else "FFFFFF"
            link_cell.fill = PatternFill("solid", start_color=bg)
        link_cell.alignment = Alignment(horizontal="center", vertical="center")
        link_cell.border = THIN_BORDER

        ws.row_dimensions[fila_idx].height = 18

    # ── Separador visual entre equity y deuda ─────────────────────────────────
    fila_sep = 4 + len(EQUITY_TICKERS)
    for col_idx in range(1, 11):
        cell = ws.cell(row=fila_sep, column=col_idx)
        cell.border = Border(
            top=Side(style="medium", color="1F3864"),
            left=cell.border.left,
            right=cell.border.right,
            bottom=cell.border.bottom,
        )

    # ── Leyenda inferior ──────────────────────────────────────────────────────
    fila_leyenda = 4 + len(ALL_TICKERS) + 1
    ws.merge_cells(f"A{fila_leyenda}:J{fila_leyenda}")
    leyenda = ws.cell(row=fila_leyenda, column=1,
                      value=("Leyenda: Compra = RSI < 35 y MACD histograma positivo  |  "
                             "Venta = RSI > 65 y MACD histograma negativo  |  "
                             "Mantener = condición intermedia  |  "
                             "Valuación: P/E para acciones, Trailing Yield para deuda  |  "
                             "Sharpe calculado con rf = 4.5% (Fed Funds implícito)"))
    leyenda.font      = Font(name="Arial", size=8, italic=True, color="595959")
    leyenda.fill      = PatternFill("solid", start_color=COLOR_WARN)
    leyenda.alignment = Alignment(wrap_text=True, vertical="center")
    leyenda.border    = THIN_BORDER
    ws.row_dimensions[fila_leyenda].height = 30

    # ── Congelar encabezados ───────────────────────────────────────────────────
    ws.freeze_panes = "A4"

    print("✔  Hoja 'Matriz de Valoración' generada.")


