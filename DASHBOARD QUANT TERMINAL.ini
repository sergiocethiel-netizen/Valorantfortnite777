def escribir_hoja_etica(wb: Workbook):
    ws = wb.create_sheet("Justificación y Ética")
    ws.sheet_view.showGridLines = False
    ws.column_dimensions["A"].width = 140

    fila = 1

    # ── Encabezado del memorándum ─────────────────────────────────────────────
    ws.merge_cells(f"A{fila}:A{fila}")
    cell = ws.cell(row=fila, column=1, value=MEMO_TEXTO["titulo"])
    cell.font      = Font(name="Arial", bold=True, color=COLOR_HEADER_FONT, size=13)
    cell.fill      = PatternFill("solid", start_color=COLOR_HEADER_BG)
    cell.alignment = Alignment(horizontal="center", vertical="center",
                               wrap_text=True)
    cell.border    = MEDIUM_BORDER
    ws.row_dimensions[fila].height = 55
    fila += 1

    # ── Función auxiliar para secciones ──────────────────────────────────────
    def agregar_seccion(titulo_key: str, cuerpo_key: str):
        nonlocal fila

        # Título de sección
        cell_t = ws.cell(row=fila, column=1, value=MEMO_TEXTO[titulo_key])
        cell_t.font      = Font(name="Arial", bold=True, color=COLOR_HEADER_FONT, size=11)
        cell_t.fill      = PatternFill("solid", start_color=COLOR_ACCENT)
        cell_t.alignment = Alignment(vertical="center", wrap_text=True, indent=1)
        cell_t.border    = THIN_BORDER
        ws.row_dimensions[fila].height = 22
        fila += 1

        # Cuerpo de sección
        cuerpo = MEMO_TEXTO[cuerpo_key]
        lineas = cuerpo.split("\n")
        n_lineas = len(lineas)
        alto_estimado = max(n_lineas * 14, 120)

        cell_c = ws.cell(row=fila, column=1, value=cuerpo)
        cell_c.font      = Font(name="Arial", size=10)
        cell_c.alignment = Alignment(vertical="top", wrap_text=True,
                                     indent=1)
        cell_c.border    = THIN_BORDER
        ws.row_dimensions[fila].height = alto_estimado
        fila += 1

        # Espacio entre secciones
        ws.row_dimensions[fila].height = 10
        fila += 1

    agregar_seccion("s1_titulo", "s1_cuerpo")
    agregar_seccion("s2_titulo", "s2_cuerpo")
    agregar_seccion("s3_titulo", "s3_cuerpo")

    # ── Pie de memorándum ─────────────────────────────────────────────────────
    pie = ws.cell(row=fila, column=1,
                  value=("Documento generado automáticamente por el sistema de "
                         "Quantitative Portfolio Management de JPMorgan Advisory. "
                         "Confidencial — Solo para uso interno del Comité de Inversiones Actinver. "
                         "Este documento no constituye asesoría de inversión personalizada "
                         "en términos de la regulación de la CNBV."))
    pie.font      = Font(name="Arial", size=8, italic=True, color="595959")
    pie.fill      = PatternFill("solid", start_color=COLOR_WARN)
    pie.alignment = Alignment(wrap_text=True, vertical="center")
    pie.border    = THIN_BORDER
    ws.row_dimensions[fila].height = 42

    print("✔  Hoja 'Justificación y Ética' generada.")


# ── Punto de entrada ──────────────────────────────────────────────────────────

def main():
    ruta_csv = sys.argv[1] if len(sys.argv) > 1 else "universo_inversion.csv"

    if not os.path.isfile(ruta_csv):
        print(f"[ERROR] No se encontró el archivo CSV en: '{ruta_csv}'")
        print("        Proporcione la ruta como argumento: "
              "python generar_reporte_portafolio.py <ruta_al_csv>")
        sys.exit(1)

    print(f"\n{'═' * 62}")
    print("  REPORTE AUTOMATIZADO — CASO ACTINVER | JPMorgan Advisory")
    print(f"{'═' * 62}\n")
    print(f"▶  Leyendo CSV: {ruta_csv}")
    df_csv = leer_csv(ruta_csv)
    print(f"   {len(df_csv)} activos leídos del CSV.")

    print("▶  Construyendo DataFrame maestro (requiere conexión a internet)…")
    df_maestro = construir_dataframe_maestro(df_csv)
    print(f"   DataFrame maestro: {len(df_maestro)} instrumentos.")

    print("▶  Generando archivo Excel…")
    wb = Workbook()
    escribir_hoja_valoracion(wb, df_maestro)
    escribir_hoja_etica(wb)

    nombre_salida = f"Reporte_Portafolio_Actinver_{datetime.today().strftime('%Y%m%d')}.xlsx"
    wb.save(nombre_salida)

    print(f"\n{'═' * 62}")
    print(f"  ✅  Reporte generado exitosamente: {nombre_salida}")
    print(f"{'═' * 62}\n")


if __name__ == "__main__":
    main()