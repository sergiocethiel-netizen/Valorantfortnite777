# ── Funciones de cálculo técnico ──────────────────────────────────────────────

def calcular_rsi(precios: pd.Series, periodo: int = 14) -> float:
    """Calcula el RSI de n períodos sobre una serie de precios de cierre."""
    delta = precios.diff().dropna()
    ganancias = delta.clip(lower=0)
    perdidas  = (-delta).clip(lower=0)
    avg_g = ganancias.ewm(com=periodo - 1, min_periods=periodo).mean()
    avg_p = perdidas.ewm(com=periodo - 1, min_periods=periodo).mean()
    rs = avg_g / avg_p.replace(0, np.nan)
    rsi = 100 - (100 / (1 + rs))
    return round(float(rsi.iloc[-1]), 2) if not rsi.empty else np.nan


def calcular_macd(precios: pd.Series,
                  rapida: int = 12,
                  lenta: int = 26,
                  senal: int = 9) -> tuple[float, float, float]:
    """
    Devuelve (línea MACD, línea de señal, histograma).
    Convención: EMA rápida - EMA lenta.
    """
    ema_r = precios.ewm(span=rapida, adjust=False).mean()
    ema_l = precios.ewm(span=lenta,  adjust=False).mean()
    macd_line   = ema_r - ema_l
    signal_line = macd_line.ewm(span=senal, adjust=False).mean()
    histograma  = macd_line - signal_line
    return (
        round(float(macd_line.iloc[-1]),   4),
        round(float(signal_line.iloc[-1]), 4),
        round(float(histograma.iloc[-1]),  4),
    )


def clasificar_senal(rsi: float, macd_hist: float) -> str:
    """
    Señal técnica direccional basada en RSI (14d) y divergencia MACD.
    Lógica conservadora alineada con perfil moderado Actinver.
    """
    if np.isnan(rsi):
        return "Sin datos"
    if rsi < 35 and macd_hist > 0:
        return "Compra"
    elif rsi > 65 and macd_hist < 0:
        return "Venta"
    else:
        return "Mantener"


def color_senal(senal: str) -> str:
    mapa = {"Compra": "375623", "Venta": "C00000", "Mantener": "7F6000"}
    return mapa.get(senal, "000000")


def descargar_historico(tickers: list[str], dias: int = 252) -> dict[str, pd.Series]:
    """Descarga precios de cierre ajustados de los últimos `dias` días hábiles."""
    fin   = datetime.today()
    inicio = fin - timedelta(days=dias * 2)
    datos = {}
    for tkr in tickers:
        try:
            hist = yf.download(tkr, start=inicio.strftime("%Y-%m-%d"),
                               end=fin.strftime("%Y-%m-%d"),
                               progress=False, auto_adjust=True)
            col = "Close"
            if isinstance(hist.columns, pd.MultiIndex):
                hist.columns = ['_'.join(c).strip('_') for c in hist.columns]
                col = [c for c in hist.columns if c.startswith("Close")][0]
            if hist.empty or col not in hist.columns:
                datos[tkr] = pd.Series(dtype=float)
            else:
                datos[tkr] = hist[col].dropna().tail(dias)
        except Exception:
            datos[tkr] = pd.Series(dtype=float)
    return datos


def obtener_valuacion(ticker: str, es_deuda: bool) -> str:
    """
    Retorna el P/E Ratio para acciones o el Trailing Annual Yield para ETFs de deuda.
    Maneja múltiples claves de la API de yfinance para mayor robustez.
    """
    try:
        info = yf.Ticker(ticker).info
        if es_deuda:
            valor = (info.get("trailingAnnualDividendYield")
                     or info.get("yield")
                     or info.get("dividendYield"))
            if valor and valor > 0:
                return f"{valor * 100:.2f}%"
            return "N/D"
        else:
            pe = (info.get("trailingPE")
                  or info.get("forwardPE"))
            if pe and pe > 0:
                return f"{pe:.2f}x"
            return "N/D"
    except Exception:
        return "N/D"


# ── Lectura y validación del CSV ──────────────────────────────────────────────

def leer_csv(ruta: str) -> pd.DataFrame:
    """
    Carga el CSV del universo de inversión.
    Se adapta a distintos esquemas de columna (nombre flexible).
    """
    df = pd.read_csv(ruta, index_col=0)

    alias_sharpe = [c for c in df.columns
                    if "sharpe" in c.lower() or "ratio" in c.lower()]
    alias_retorno = [c for c in df.columns
                     if "retorno" in c.lower() or "return" in c.lower()
                     or "rendimiento" in c.lower()]

    if not alias_sharpe:
        raise ValueError("El CSV no contiene una columna de Sharpe Ratio reconocible. "
                         "Verifique que la columna contenga la palabra 'sharpe' o 'ratio'.")
    if not alias_retorno:
        raise ValueError("El CSV no contiene una columna de retorno/rendimiento reconocible.")

    df = df.rename(columns={
        alias_sharpe[0]:  "Sharpe_Ratio",
        alias_retorno[0]: "Retorno_Anualizado",
    })
    return df


# ── Construcción del DataFrame maestro ───────────────────────────────────────

def construir_dataframe_maestro(df_csv: pd.DataFrame) -> pd.DataFrame:
    """
    Ensambla la tabla de valoración combinando datos del CSV con descargas
    en tiempo real de yfinance.
    """
    print("▶  Descargando precios históricos (últimos 252 días hábiles)…")
    historicos = descargar_historico(ALL_TICKERS)

    registros = []

    # ── Activos de Renta Variable (del CSV) ──────────────────────────────────
    for tkr in EQUITY_TICKERS:
        sharpe = np.nan
        if tkr in df_csv.index and "Sharpe_Ratio" in df_csv.columns:
            sharpe = float(df_csv.loc[tkr, "Sharpe_Ratio"])

        precios = historicos.get(tkr, pd.Series(dtype=float))
        if len(precios) >= 30:
            rsi      = calcular_rsi(precios)
            m, s, h  = calcular_macd(precios)
        else:
            rsi, m, s, h = np.nan, np.nan, np.nan, np.nan

        senal = clasificar_senal(rsi, h)
        print(f"   {tkr}: RSI={rsi}, MACD_hist={h:.4f}, Señal={senal}")

        registros.append({
            "Ticker":                 tkr,
            "Tipo_de_Activo":         "Capital (Equity)",
            "Valuacion_Relativa":     obtener_valuacion(tkr, es_deuda=False),
            "Sharpe_Ratio":           round(sharpe, 4) if not np.isnan(sharpe) else np.nan,
            "RSI_14d":                rsi,
            "MACD_Linea":             m,
            "MACD_Senal":             s,
            "MACD_Histograma":        h,
            "Senal_Tecnica":          senal,
            "URL_Yahoo":              f"{YAHOO_BASE}{tkr}",
        })

    # ── Activos de Renta Fija (descargados en vivo) ───────────────────────────
    for tkr in DEBT_TICKERS:
        precios = historicos.get(tkr, pd.Series(dtype=float))

        if len(precios) >= 30:
            rsi     = calcular_rsi(precios)
            m, s, h = calcular_macd(precios)
            retornos_d = precios.pct_change().dropna()
            std_anual  = retornos_d.std() * math.sqrt(252)
            ret_anual  = retornos_d.mean() * 252
            rf         = 0.045  # Tasa libre de riesgo: Fed Funds ~4.5%
            sharpe = (ret_anual - rf) / std_anual if std_anual > 0 else np.nan
        else:
            rsi, m, s, h, sharpe = np.nan, np.nan, np.nan, np.nan, np.nan

        senal = clasificar_senal(rsi, h if not np.isnan(h) else 0)
        print(f"   {tkr}: RSI={rsi}, MACD_hist={h:.4f}, Señal={senal}")

        registros.append({
            "Ticker":                 tkr,
            "Tipo_de_Activo":         "Deuda (Fixed Income)",
            "Valuacion_Relativa":     obtener_valuacion(tkr, es_deuda=True),
            "Sharpe_Ratio":           round(sharpe, 4) if not np.isnan(sharpe) else np.nan,
            "RSI_14d":                rsi,
            "MACD_Linea":             m,
            "MACD_Senal":             s,
            "MACD_Histograma":        h,
            "Senal_Tecnica":          senal,
            "URL_Yahoo":              f"{YAHOO_BASE}{tkr}",
        })

    return pd.DataFrame(registros)


# ── Estilos de openpyxl ───────────────────────────────────────────────────────

def estilo_encabezado(cell, negrita: bool = True):
    cell.font      = Font(name="Arial", bold=negrita, color=COLOR_HEADER_FONT, size=10)
    cell.fill      = PatternFill("solid", start_color=COLOR_HEADER_BG)
    cell.alignment = Alignment(horizontal="center", vertical="center", wrap_text=True)
    cell.border    = THIN_BORDER


def estilo_fila_equity(cell, indice: int):
    bg = COLOR_STRIPE if indice % 2 == 0 else "FFFFFF"
    cell.fill      = PatternFill("solid", start_color=bg)
    cell.alignment = Alignment(horizontal="center", vertical="center")
    cell.border    = THIN_BORDER
    cell.font      = Font(name="Arial", size=9)


def estilo_fila_deuda(cell):
    cell.fill      = PatternFill("solid", start_color=COLOR_DEUDA_BG)
    cell.alignment = Alignment(horizontal="center", vertical="center")
    cell.border    = THIN_BORDER
    cell.font      = Font(name="Arial", size=9, italic=True)


